version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: pashudoctor-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: pashudoctor-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../backend/Dockerfile # Reusing backend image structure if it works, or I should create a frontend/Dockerfile
    # Wait, the user didn't specify a frontend/Dockerfile but I should probably create one.
    # For now, I'll assume a separate Dockerfile if I create it.
    container_name: pashudoctor-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend

volumes:
  data:
